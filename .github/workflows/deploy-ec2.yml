# ─────────────────────────────────────────────────────────────────────
#  CI/CD: Build → Push to ECR → Deploy to EC2 (individual containers)
#  NO docker-compose on EC2 — each container runs independently.
#  Manual trigger only (workflow_dispatch) with test/build/deploy steps.
# ─────────────────────────────────────────────────────────────────────

name: Build, Push ECR & Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip tests'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
  MONGO_URI_USER: ${{ secrets.MONGO_URI_USER || 'mongodb://localhost:27017/userdb' }}
  MONGO_URI_PRODUCT: ${{ secrets.MONGO_URI_PRODUCT || 'mongodb://localhost:27017/productdb' }}
  MONGO_URI_ORDER: ${{ secrets.MONGO_URI_ORDER || 'mongodb://localhost:27017/orderdb' }}

jobs:
  # ──────────────────────────── TEST ────────────────────────────
  test:
    name: Test Services
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        service: [user-service, product-service, order-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run linter (if configured)
        working-directory: ${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests (if configured)
        working-directory: ${{ matrix.service }}
        run: npm test --if-present
        env:
          PORT: 0
          MONGO_URI: mongodb://localhost:27017/testdb_${{ matrix.service }}
          ORDER_SERVICE_URL: http://localhost:4003
          USER_SERVICE_URL: http://localhost:4001
          PRODUCT_SERVICE_URL: http://localhost:4002

      - name: Health check build
        working-directory: ${{ matrix.service }}
        run: |
          echo "✅ ${{ matrix.service }} — dependencies install and build OK"

  # ──────────────────────────── BUILD & PUSH ────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    strategy:
      matrix:
        include:
          - service: user-service
            context: ./user-service
          - service: product-service
            context: ./product-service
          - service: order-service
            context: ./order-service
          - service: frontend
            context: ./frontend

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          TAG="${{ github.sha }}-$(date +%Y%m%d%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Image tag: $TAG"

      - name: Build & push ${{ matrix.service }}
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/ecs-learning/${{ matrix.service }}"
          TAG="${{ steps.meta.outputs.tag }}"

          BUILD_ARGS=""
          if [ "${{ matrix.service }}" = "frontend" ]; then
            BUILD_ARGS="--build-arg NEXT_PUBLIC_USER_SERVICE_URL=http://${{ env.EC2_HOST }}:4001"
            BUILD_ARGS="$BUILD_ARGS --build-arg NEXT_PUBLIC_PRODUCT_SERVICE_URL=http://${{ env.EC2_HOST }}:4002"
            BUILD_ARGS="$BUILD_ARGS --build-arg NEXT_PUBLIC_ORDER_SERVICE_URL=http://${{ env.EC2_HOST }}:4003"
          fi

          docker build $BUILD_ARGS \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            ${{ matrix.context }}

          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

          echo "✅ Pushed $IMAGE:$TAG"


