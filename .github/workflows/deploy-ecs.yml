# ─────────────────────────────────────────────────────────────────────
#  CI/CD: Build → Push to ECR → Deploy to AWS ECS Fargate
#  Updates ECS task definitions with new images, then updates services.
#  Manual trigger only (workflow_dispatch).
# ─────────────────────────────────────────────────────────────────────

name: Build, Push ECR & Deploy to ECS
on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION || 'us-east-1' }}.amazonaws.com
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER || 'ecs-learning-cluster' }}
  ALB_DNS: ${{ secrets.ALB_DNS || 'example.com' }}
  MONGO_HOST: ${{ secrets.MONGO_HOST || 'mongo.ecs-learning.local' }}

jobs:
  # ──────────────────────────── TEST ────────────────────────────
  test:
    name: Test Services
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        service: [user-service, product-service, order-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run linter (if configured)
        working-directory: ${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests (if configured)
        working-directory: ${{ matrix.service }}
        run: npm test --if-present
        env:
          PORT: 0
          MONGO_URI: mongodb://localhost:27017/testdb_${{ matrix.service }}
          ORDER_SERVICE_URL: http://localhost:4003
          USER_SERVICE_URL: http://localhost:4001
          PRODUCT_SERVICE_URL: http://localhost:4002

      - name: Verify build
        working-directory: ${{ matrix.service }}
        run: echo "✅ ${{ matrix.service }} — OK"

  # ──────────────────────────── BUILD & PUSH ────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    strategy:
      matrix:
        include:
          - service: user-service
            context: ./user-service
          - service: product-service
            context: ./product-service
          - service: order-service
            context: ./order-service
          - service: frontend
            context: ./frontend

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          TAG="${{ github.sha }}-$(date +%Y%m%d%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Image tag: $TAG"

      - name: Build & push ${{ matrix.service }}
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/ecs-learning/${{ matrix.service }}"
          TAG="latest"

          BUILD_ARGS=""
          if [ "${{ matrix.service }}" = "frontend" ]; then
            BUILD_ARGS="--build-arg NEXT_PUBLIC_USER_SERVICE_URL=http://${{ env.ALB_DNS }}/user-service"
            BUILD_ARGS="$BUILD_ARGS --build-arg NEXT_PUBLIC_PRODUCT_SERVICE_URL=http://${{ env.ALB_DNS }}/product-service"
            BUILD_ARGS="$BUILD_ARGS --build-arg NEXT_PUBLIC_ORDER_SERVICE_URL=http://${{ env.ALB_DNS }}/order-service"
          fi

          docker build $BUILD_ARGS \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            ${{ matrix.context }}

          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

          echo "✅ Pushed $IMAGE:$TAG"

