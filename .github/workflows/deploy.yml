name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      # ─────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─────────────────────────────
      # 2. Login to ACR (GitHub runner)
      # ─────────────────────────────
      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      # ─────────────────────────────
      # 3. Build Images
      # ─────────────────────────────
      - name: Build Docker Images
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest ./user-service
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest ./product-service
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest ./order-service
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest ./frontend

      # ─────────────────────────────
      # 4. Push Images to ACR
      # ─────────────────────────────
      - name: Push Docker Images
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest

      # ─────────────────────────────
      # 5. Deploy on VM (SSH)
      # ─────────────────────────────
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          debug: true
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "SSH CONNECTED SUCCESSFULLY"
