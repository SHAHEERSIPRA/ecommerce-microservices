name: CI/CD Pipeline - Azure VM Deploy (Production Stable)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout Code
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # Login to ACR
      # =========================
      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

      # =========================
      # Build Images (NO CACHE + CLEAN ENV)
      # =========================
      - name: Build Docker Images
        run: |
          echo "🔨 Building backend services..."

          docker build --no-cache \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest ./user-service

          docker build --no-cache \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest ./product-service

          docker build --no-cache \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest ./order-service

          echo "🔨 Building frontend (NGINX API Gateway mode)..."

          docker build --no-cache \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest ./frontend \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

          echo "🔨 Building NGINX..."

          docker build --no-cache \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest ./nginx

      # =========================
      # Push Images
      # =========================
      - name: Push Docker Images
        run: |
          echo "📤 Pushing images to ACR..."

          docker push ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest

      # =========================
      # Deploy to Azure VM
      # =========================
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            echo "🔐 Login to ACR..."
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
              -u "${{ secrets.ACR_USERNAME }}" --password-stdin

            echo "🧹 SAFE CLEAN (avoid image lock issues)"

            docker stop user-service product-service order-service frontend nginx mongo || true
            docker rm user-service product-service order-service frontend nginx mongo || true

            echo "🧹 Removing unused containers/images safely..."
            docker container prune -f || true
            docker image prune -af || true

            echo "🌐 Creating Docker network..."
            docker network create ecommerce-net || true

            echo "📦 Starting MongoDB..."
            docker run -d \
              --name mongo \
              --network ecommerce-net \
              mongo:7

            echo "⬇️ Pulling latest images..."
            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest
            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest
            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest
            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest

            echo "🚀 Running backend services (PRIVATE ONLY)"

            docker run -d \
              --name user-service \
              --network ecommerce-net \
              -e MONGO_URI=mongodb://mongo:27017/userdb \
              ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest

            docker run -d \
              --name product-service \
              --network ecommerce-net \
              -e MONGO_URI=mongodb://mongo:27017/productdb \
              ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest

            docker run -d \
              --name order-service \
              --network ecommerce-net \
              -e MONGO_URI=mongodb://mongo:27017/orderdb \
              ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest

            echo "🚀 Running frontend (NO PUBLIC PORT)"

            docker run -d \
              --name frontend \
              --network ecommerce-net \
              ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest

            echo "🌐 Running NGINX (ONLY ENTRY POINT)"

            docker run -d \
              --name nginx \
              --network ecommerce-net \
              -p 80:80 \
              ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest

            echo "✅ Deployment SUCCESS!"
