name: CI/CD Pipeline - Azure VM Deploy (Stable Fixed)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout Code
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # Login to ACR
      # =========================
      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

      # =========================
      # Build Images
      # =========================
      - name: Build Docker Images
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest ./user-service
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest ./product-service
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest ./order-service

          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest ./frontend \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest ./nginx

      # =========================
      # Push Images
      # =========================
      - name: Push Images
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest

      # =========================
      # Deploy to VM
      # =========================
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            echo "🔐 Login to ACR"
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
              -u "${{ secrets.ACR_USERNAME }}" --password-stdin

            echo "🧹 Cleaning old containers..."
            docker rm -f nginx frontend user-service product-service order-service mongo || true

            echo "🌐 Ensuring network exists..."
            docker network create ecommerce-net || true

            echo "📦 Starting MongoDB..."
            docker run -d \
              --name mongo \
              --network ecommerce-net \
              --restart unless-stopped \
              mongo:7

            echo "⬇️ Pulling images..."
            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest
            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest
            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest
            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest

            echo "🚀 Starting backend services..."

            docker run -d \
              --name user-service \
              --network ecommerce-net \
              --restart unless-stopped \
              -e MONGO_URI=mongodb://mongo:27017/userdb \
              ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest

            docker run -d \
              --name product-service \
              --network ecommerce-net \
              --restart unless-stopped \
              -e MONGO_URI=mongodb://mongo:27017/productdb \
              ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest

            docker run -d \
              --name order-service \
              --network ecommerce-net \
              --restart unless-stopped \
              -e MONGO_URI=mongodb://mongo:27017/orderdb \
              ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest

            echo "🚀 Starting frontend..."
            docker run -d \
              --name frontend \
              --network ecommerce-net \
              --restart unless-stopped \
              ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest

            echo "🌐 Starting nginx..."
            docker run -d \
              --name nginx \
              --network ecommerce-net \
              -p 80:80 \
              --restart unless-stopped \
              ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest

            echo "✅ DEPLOYMENT DONE"
