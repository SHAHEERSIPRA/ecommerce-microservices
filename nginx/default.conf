server {
    listen 80;

    # FRONTEND
    location / {
        proxy_pass http://frontend:3000;
    }

    # USERS
    location /api/users/ {
        proxy_pass http://user-service:4001;
    }

    # PRODUCTS
    location /api/products/ {
        proxy_pass http://product-service:4002;
    }

    # ORDERS
    location /api/orders/ {
        proxy_pass http://order-service:4003;
    }
}
