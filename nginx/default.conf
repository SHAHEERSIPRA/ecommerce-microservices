server {
    listen 80;

    location / {
        proxy_pass http://frontend:3000;
    }

    location /api/users/ {
        proxy_pass http://user-service:4001/;
        rewrite ^/api/users/?(.*)$ /api/users/$1 break;
    }

    location /api/products/ {
        proxy_pass http://product-service:4002/;
        rewrite ^/api/products/?(.*)$ /api/products/$1 break;
    }

    location /api/orders/ {
        proxy_pass http://order-service:4003/;
        rewrite ^/api/orders/?(.*)$ /api/orders/$1 break;
    }
}
