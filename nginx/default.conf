server {
    listen 80;

    # Frontend
    location / {
        proxy_pass http://frontend:3000;
    }

    # 🔥 FORCE FIX: redirect localhost calls

    location /traffic {
        proxy_pass http://user-service:4001/traffic;
    }

    location /users {
        proxy_pass http://user-service:4001;
    }

    location /products {
        proxy_pass http://product-service:4002;
    }

    location /orders {
        proxy_pass http://order-service:4003;
    }
}
