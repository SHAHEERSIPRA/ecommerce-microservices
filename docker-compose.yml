services:
  # ─── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: ecs-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ecs-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── User Microservice ──────────────────────────────────
  user-service:
    build: ./user-service
    container_name: ecs-user-service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - MONGO_URI=mongodb://mongo:27017/userdb
      - ORDER_SERVICE_URL=http://order-service:4003
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ecs-network
    restart: unless-stopped

  # ─── Product Microservice ───────────────────────────────
  product-service:
    build: ./product-service
    container_name: ecs-product-service
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - MONGO_URI=mongodb://mongo:27017/productdb
      - ORDER_SERVICE_URL=http://order-service:4003
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ecs-network
    restart: unless-stopped

  # ─── Order Microservice ─────────────────────────────────
  order-service:
    build: ./order-service
    container_name: ecs-order-service
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - MONGO_URI=mongodb://mongo:27017/orderdb
      - USER_SERVICE_URL=http://user-service:4001
      - PRODUCT_SERVICE_URL=http://product-service:4002
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ecs-network
    restart: unless-stopped

  # ─── Next.js Frontend (calls services directly — no API Gateway) ─
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_USER_SERVICE_URL=http://localhost:4001
        - NEXT_PUBLIC_PRODUCT_SERVICE_URL=http://localhost:4002
        - NEXT_PUBLIC_ORDER_SERVICE_URL=http://localhost:4003
    container_name: ecs-frontend
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - ecs-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  ecs-network:
    driver: bridge
